<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test EduLib</title>
<style>
body{font-family:sans-serif;padding:2rem;background:#f0f4ff}
button{padding:12px 24px;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin:8px}
.box{background:#fff;padding:2rem;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);margin-bottom:1rem}
#result{color:green;font-weight:600;margin-top:1rem;font-size:1.1rem}
</style>
</head>
<body>
<div class="box">
  <h2>🧪 Test JavaScript EduLib RDC</h2>
  <p>Clique sur chaque bouton pour tester :</p>
  <button onclick="testBtn()">✅ Test bouton simple</button>
  <button onclick="testAlert()">🔔 Test alert</button>
  <button onclick="testForm()">📝 Test formulaire</button>
  <div id="result"></div>
</div>

<div class="box">
  <h2>📝 Mini formulaire d'inscription</h2>
  <input type="text" id="testName" placeholder="Ton nom" style="padding:10px;border:2px solid #ddd;border-radius:8px;width:100%;margin-bottom:8px;font-size:1rem"/>
  <br/>
  <button onclick="testRegister()">S'inscrire (test)</button>
  <div id="regResult"></div>
</div>

<div class="box">
  <h2>🔐 Menu hamburger test</h2>
  <button onclick="toggleTest()">☰ Menu</button>
  <div id="menuTest" style="display:none;background:#1a56db;color:#fff;padding:1rem;border-radius:8px;margin-top:8px">Menu ouvert !</div>
</div>

<script>
function testBtn(){
  document.getElementById('result').textContent = '✅ JavaScript fonctionne ! Bouton cliqué.';
}

function testAlert(){
  alert('JavaScript marche !');
}

function testForm(){
  document.getElementById('result').textContent = '✅ Formulaire test OK - ' + new Date().toLocaleTimeString();
}

function testRegister(){
  var name = document.getElementById('testName').value.trim();
  if(!name){
    document.getElementById('regResult').innerHTML = '<span style="color:red">Entre ton nom !</span>';
    return;
  }
  document.getElementById('regResult').innerHTML = '<span style="color:green">✅ Inscription réussie pour : ' + name + '</span>';
}

function toggleTest(){
  var m = document.getElementById('menuTest');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}

// Auto-test au chargement
window.onload = function(){
  document.getElementById('result').textContent = '✅ Page chargée correctement !';
};
</script>
</body>
</html>
