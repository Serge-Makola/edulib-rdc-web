<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnostic EduLib</title>
<style>
body{font-family:sans-serif;padding:1.5rem;background:#f0f4ff;max-width:600px;margin:0 auto}
.box{background:#fff;padding:1.5rem;border-radius:12px;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.ok{color:#059669;font-weight:700}
.err{color:#dc2626;font-weight:700}
button{padding:12px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;margin:4px;font-family:sans-serif}
input{width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:1rem;box-sizing:border-box;margin-bottom:8px}
#log{background:#1e293b;color:#94a3b8;padding:1rem;border-radius:8px;font-family:monospace;font-size:0.8rem;max-height:300px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<div class="box">
  <h2>🔍 Diagnostic EduLib RDC</h2>
  <p>Ce test va identifier exactement pourquoi les boutons ne marchent pas.</p>
</div>

<div class="box">
  <h3>Test 1 — Bouton simple</h3>
  <button onclick="test1()">Cliquer ici</button>
  <div id="t1">En attente...</div>
</div>

<div class="box">
  <h3>Test 2 — Firebase</h3>
  <button onclick="test2()">Tester Firebase</button>
  <div id="t2">En attente...</div>
</div>

<div class="box">
  <h3>Test 3 — Connexion Firebase</h3>
  <input type="email" id="testEmail" placeholder="email@test.com"/>
  <input type="password" id="testPass" placeholder="motdepasse"/>
  <button onclick="test3()">Tester connexion</button>
  <div id="t3">En attente...</div>
</div>

<div class="box">
  <h3>Test 4 — Inscription Firebase</h3>
  <button onclick="test4()">Créer compte test</button>
  <div id="t4">En attente...</div>
</div>

<div class="box">
  <h3>Log détaillé</h3>
  <div id="log">En attente des tests...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var logEl = document.getElementById('log');
function log(msg){logEl.textContent += msg + '\n';logEl.scrollTop = logEl.scrollHeight;}

// Test 1
function test1(){
  document.getElementById('t1').innerHTML = '<span class="ok">✅ JavaScript fonctionne !</span>';
  log('Test 1: OK');
}

// Test 2 - Firebase init
function test2(){
  try{
    var cfg = {
      apiKey: "AIzaSyAoxL9c71QEhA1-TLdmiTDjnxWFhprWe44",
      authDomain: "edulib-rdc.firebaseapp.com",
      projectId: "edulib-rdc"
    };
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    document.getElementById('t2').innerHTML = '<span class="ok">✅ Firebase initialisé !</span>';
    log('Test 2: Firebase OK');
  }catch(e){
    document.getElementById('t2').innerHTML = '<span class="err">❌ Erreur: ' + e.message + '</span>';
    log('Test 2 ERREUR: ' + e.message);
  }
}

// Test 3 - Login
function test3(){
  var email = document.getElementById('testEmail').value.trim();
  var pass = document.getElementById('testPass').value;
  if(!email||!pass){document.getElementById('t3').innerHTML='<span class="err">Remplissez email et mot de passe</span>';return;}
  log('Test 3: tentative connexion avec ' + email);
  document.getElementById('t3').textContent = 'Connexion...';
  try{
    var auth = firebase.auth();
    auth.signInWithEmailAndPassword(email, pass)
      .then(function(u){
        document.getElementById('t3').innerHTML = '<span class="ok">✅ Connexion réussie ! Bienvenue ' + (u.user.displayName||u.user.email) + '</span>';
        log('Test 3: Connexion OK - ' + u.user.email);
      })
      .catch(function(e){
        document.getElementById('t3').innerHTML = '<span class="err">❌ ' + e.message + '</span>';
        log('Test 3 ERREUR: ' + e.code + ' - ' + e.message);
      });
  }catch(e){
    document.getElementById('t3').innerHTML = '<span class="err">❌ Exception: ' + e.message + '</span>';
    log('Test 3 EXCEPTION: ' + e.message);
  }
}

// Test 4 - Register
function test4(){
  var email = 'test' + Date.now() + '@edulib.com';
  var pass = 'test123456';
  log('Test 4: creation compte ' + email);
  document.getElementById('t4').textContent = 'Création...';
  try{
    var auth = firebase.auth();
    auth.createUserWithEmailAndPassword(email, pass)
      .then(function(u){
        document.getElementById('t4').innerHTML = '<span class="ok">✅ Compte créé ! ' + u.user.email + '</span>';
        log('Test 4: Inscription OK');
        // Clean up
        u.user.delete();
      })
      .catch(function(e){
        document.getElementById('t4').innerHTML = '<span class="err">❌ ' + e.message + '</span>';
        log('Test 4 ERREUR: ' + e.code + ' - ' + e.message);
      });
  }catch(e){
    document.getElementById('t4').innerHTML = '<span class="err">❌ Exception: ' + e.message + '</span>';
    log('Test 4 EXCEPTION: ' + e.message);
  }
}

// Auto-init
window.onload = function(){
  log('Page chargée - Safari détecté: ' + /Safari/.test(navigator.userAgent));
  log('Firebase disponible: ' + (typeof firebase !== 'undefined'));
  log('URL: ' + window.location.href);
};
</script>
</body>
</html>
